# ─── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: agentos
---
# ─── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentos-config
  namespace: agentos
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  REDIS_URL: "redis://redis-service:6379/0"
---
# ─── Secret (replace with sealed-secrets or vault in prod) ───────────────────
apiVersion: v1
kind: Secret
metadata:
  name: agentos-secrets
  namespace: agentos
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://agentos:secret@postgres-service:5432/agentos"
  SECRET_KEY: "change-me-in-production-32-chars-min"
  AZURE_OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  TAVILY_API_KEY: ""
  LANGCHAIN_API_KEY: ""
---
# ─── Gateway Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos-gateway
  namespace: agentos
  labels:
    app: agentos-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentos-gateway
  template:
    metadata:
      labels:
        app: agentos-gateway
    spec:
      containers:
        - name: gateway
          image: agentos-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: agentos-config
            - secretRef:
                name: agentos-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
# ─── Gateway Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: agentos-gateway-service
  namespace: agentos
spec:
  selector:
    app: agentos-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# ─── Ingress ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentos-ingress
  namespace: agentos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: agentos.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentos-gateway-service
                port:
                  number: 8000
---
# ─── HorizontalPodAutoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentos-gateway-hpa
  namespace: agentos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentos-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
