name: AgentOS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/agentos-gateway

jobs:
  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Use uv instead of Poetry — same approach as the Dockerfile.
      # uv resolves heavy AI/ML dependencies (langgraph, chromadb, torch)
      # without the backtracking loops that cause Poetry to hang.
      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r <(uv pip compile pyproject.toml)

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:secret@localhost:5432/agentos_test
        run: alembic upgrade head

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:secret@localhost:5432/agentos_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentos:secret@localhost:5432/agentos_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
        run: |
          pytest tests/integration/ -v --tb=short

  # ─── Build & Push ───────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  # NOTE: This job deploys to a remote Kubernetes cluster via KUBECONFIG.
  # For local k3d development, this job is skipped (it needs a cloud K8s endpoint).
  # To enable: add your base64-encoded kubeconfig as a GitHub secret named KUBECONFIG.
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to main AND only if the KUBECONFIG secret is configured.
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Inject secrets into cluster
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          kubectl create secret generic agentos-secrets \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --from-literal=AZURE_OPENAI_API_KEY="$AZURE_OPENAI_API_KEY" \
            --from-literal=GOOGLE_API_KEY="$GOOGLE_API_KEY" \
            --from-literal=TAVILY_API_KEY="$TAVILY_API_KEY" \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            -n agentos --dry-run=client -o yaml | kubectl apply -f -

      - name: Rolling update gateway image
        run: |
          kubectl set image deployment/agentos-gateway \
            gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n agentos

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agentos-gateway \
            -n agentos --timeout=180s

      - name: Verify health
        run: |
          kubectl get pods -n agentos
          echo "✅ Deployment complete: sha-${{ github.sha }}"
